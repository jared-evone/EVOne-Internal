{% extends "base.html" %}
{% block title %}Sales Agents — EVOne OPS{% endblock %}

{% block content %}
<div class="flex flex-col h-full overflow-hidden bg-gray-50">

    <!-- Header -->
    <div class="px-8 pt-6 pb-0 shrink-0 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Sales Agents</h1>
            <p class="text-sm text-gray-400 mt-0.5" id="pageDate"></p>
        </div>
        <button onclick="openAgentModal()" id="addAgentBtn"
            class="hidden text-white text-sm font-semibold px-4 py-2 rounded-lg hover:opacity-90 transition"
            style="background:#1a3a2a">+ Add Agent</button>
    </div>

    <!-- Stats -->
    <div class="px-8 py-5 grid grid-cols-3 gap-4 shrink-0">
        <div class="rounded-2xl shadow-sm p-5" style="background:#1a3a2a">
            <p class="text-xs font-semibold uppercase tracking-wider mb-3" style="color:#6ee7b7">Total Agents</p>
            <p class="text-4xl font-black text-white" id="statAgents">—</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Pipeline Value</p>
            <p class="text-4xl font-black text-gray-900" id="statPipeline">—</p>
            <p class="text-xs text-gray-400 mt-1">Active deals</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Total Deals</p>
            <p class="text-4xl font-black text-gray-900" id="statDeals">—</p>
            <p class="text-xs text-gray-400 mt-1">Across all agents</p>
        </div>
    </div>

    <!-- Agent grid -->
    <div class="flex-1 overflow-y-auto px-8 pb-8 min-h-0">
        <div id="agentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="col-span-3 py-16 flex flex-col items-center gap-3 text-gray-400">
                <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                <span class="text-sm">Loading agents…</span>
            </div>
        </div>
    </div>
</div>

<!-- Detail panel backdrop -->
<div id="detailBackdrop" class="hidden fixed inset-0 z-20" style="background:rgba(0,0,0,0.15)" onclick="closePanel()"></div>

<!-- Detail panel -->
<div id="detailPanel" class="fixed top-0 right-0 h-full bg-white shadow-2xl z-30 flex flex-col"
     style="width:26rem;transform:translateX(100%);transition:transform 0.2s ease">

    <!-- Panel header -->
    <div class="flex items-center gap-3 px-6 pt-6 pb-4 border-b shrink-0">
        <div id="panelAvatar" class="w-11 h-11 rounded-full flex items-center justify-center font-bold text-lg shrink-0"></div>
        <div class="min-w-0 flex-1">
            <p class="font-bold text-gray-900 text-base truncate" id="panelName">—</p>
            <p class="text-xs text-gray-400 truncate" id="panelContact"></p>
        </div>
        <div class="flex gap-1 shrink-0">
            <button id="panelEditBtn" onclick="editPanelAgent()"
                class="hidden w-8 h-8 flex items-center justify-center rounded-full border text-gray-400 hover:text-blue-600 hover:border-blue-300 transition">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
            </button>
            <button onclick="closePanel()"
                class="w-8 h-8 flex items-center justify-center rounded-full border text-gray-400 hover:text-gray-600 transition text-lg leading-none">×</button>
        </div>
    </div>

    <!-- Panel stats -->
    <div class="grid grid-cols-2 divide-x border-b shrink-0">
        <div class="px-5 py-3 text-center">
            <p class="text-2xl font-black text-gray-900" id="panelDealCount">—</p>
            <p class="text-xs text-gray-400 mt-0.5">Deals</p>
        </div>
        <div class="px-5 py-3 text-center">
            <p class="text-xl font-black text-gray-900" id="panelPipeline">—</p>
            <p class="text-xs text-gray-400 mt-0.5">Pipeline</p>
        </div>
    </div>

    <!-- Stage filter tabs -->
    <div class="flex gap-1 px-4 py-3 border-b shrink-0 flex-wrap" id="panelStageTabs"></div>

    <!-- Scrollable content -->
    <div class="flex-1 overflow-y-auto">
        <div class="px-4 pt-4 pb-2">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Deals</p>
            <div id="panelDeals" class="space-y-2"></div>
        </div>
        <div class="px-4 pt-2 pb-6">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 mt-4">
                Customers <span id="panelCustomerCount" class="normal-case font-normal text-gray-400"></span>
            </p>
            <div id="panelCustomers" class="flex flex-wrap gap-2"></div>
        </div>
    </div>

    <div class="px-6 py-4 border-t shrink-0">
        <button onclick="closePanel()"
            class="w-full px-4 py-2 border rounded-lg text-sm font-medium hover:bg-gray-50 transition">Close</button>
    </div>
</div>

<!-- Add / Edit Agent Modal -->
<div id="agentModal" class="hidden fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
        <div class="flex items-center justify-between px-6 pt-6 pb-4">
            <h2 class="text-xl font-bold text-gray-900" id="agentModalTitle">Add Agent</h2>
            <button onclick="closeAgentModal()"
                class="w-8 h-8 flex items-center justify-center rounded-full border text-gray-400 hover:text-gray-600 transition text-lg leading-none">×</button>
        </div>
        <div class="px-6 pb-6 space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Name *</label>
                <input id="af_name" type="text"
                    class="w-full px-3 py-2.5 border rounded-xl focus:ring-2 focus:ring-evgreen outline-none text-sm">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Email</label>
                    <input id="af_email" type="email"
                        class="w-full px-3 py-2.5 border rounded-xl focus:ring-2 focus:ring-evgreen outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Phone</label>
                    <input id="af_phone" type="text"
                        class="w-full px-3 py-2.5 border rounded-xl focus:ring-2 focus:ring-evgreen outline-none text-sm">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Notes</label>
                <textarea id="af_notes" rows="2"
                    class="w-full px-3 py-2.5 border rounded-xl focus:ring-2 focus:ring-evgreen outline-none text-sm resize-none"></textarea>
            </div>
            <div id="agentModalError" class="hidden text-red-600 text-sm"></div>
            <div class="flex gap-3 pt-1">
                <button onclick="closeAgentModal()"
                    class="flex-1 px-4 py-2.5 border rounded-xl text-sm font-medium hover:bg-gray-50 transition">Cancel</button>
                <button onclick="submitAgent()" id="agentModalSubmitBtn"
                    class="flex-1 text-white px-4 py-2.5 rounded-xl text-sm font-bold hover:opacity-90 transition"
                    style="background:#1a3a2a">Create</button>
            </div>
        </div>
    </div>
</div>

<script>
const STAGE_STYLE = {
    Lead:        'bg-blue-100 text-blue-700',
    Proposal:    'bg-purple-100 text-purple-700',
    Negotiation: 'bg-amber-100 text-amber-700',
    Won:         'bg-green-100 text-green-700',
    Lost:        'bg-red-100 text-red-600',
};
const OPEN_STAGES   = new Set(['Lead', 'Proposal', 'Negotiation']);
const AVATAR_BG     = ['#dcfce7','#dbeafe','#ede9fe','#fef9c3','#fce7f3','#e0f2fe','#ffedd5'];
const AVATAR_FG     = ['#166534','#1e40af','#5b21b6','#713f12','#9d174d','#075985','#9a3412'];

let allAgents        = [];
let panelStageFilter = 'All';
let panelDealsData   = [];
let currentPanelAgentId = null;
let editingAgentId   = null;
let isAdmin          = false;

function esc(s) {
    const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML;
}

function avatarStyle(label) {
    const i = ((label || ' ').toUpperCase().charCodeAt(0) - 65 + 26) % AVATAR_BG.length;
    return `background:${AVATAR_BG[i]};color:${AVATAR_FG[i]}`;
}

function fmtSGD(n) {
    if (n >= 1_000_000) return `SGD ${(n / 1_000_000).toFixed(1)}M`;
    if (n >= 1_000)     return `SGD ${(n / 1_000).toFixed(1)}k`;
    return `SGD ${Number(n || 0).toFixed(0)}`;
}

async function onPageLoad() {
    document.getElementById('pageDate').textContent = new Date().toLocaleDateString('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric',
    });
    try {
        const me = await fetch('/api/me', { headers: getAuthHeaders() }).then(r => r.json());
        isAdmin = me.role_id === 1;
        if (isAdmin) {
            document.getElementById('addAgentBtn').classList.remove('hidden');
            document.getElementById('panelEditBtn').classList.remove('hidden');
        }
    } catch (_) {}
    await loadAgents();
}

async function loadAgents() {
    try {
        const res  = await fetch('/api/agents', { headers: getAuthHeaders() });
        const data = await res.json();
        if (data.error) throw new Error(data.message);
        allAgents = data.agents || [];
        renderStats(allAgents);
        renderGrid(allAgents);
    } catch (e) {
        document.getElementById('agentGrid').innerHTML =
            `<div class="col-span-3 py-16 text-center text-red-500 font-bold">Failed to load agents: ${esc(e.message)}</div>`;
    }
}

function renderStats(agents) {
    const totalDeals    = agents.reduce((s, a) => s + a.deal_count, 0);
    const totalPipeline = agents.reduce((s, a) => s + a.pipeline_value, 0);
    document.getElementById('statAgents').textContent   = agents.length;
    document.getElementById('statPipeline').textContent = fmtSGD(totalPipeline);
    document.getElementById('statDeals').textContent    = totalDeals;
}

function renderGrid(agents) {
    const grid = document.getElementById('agentGrid');
    if (!agents.length) {
        grid.innerHTML = `<div class="col-span-3 py-16 text-center text-gray-400 text-sm">No agents found.${isAdmin ? ' <button onclick="openAgentModal()" class="underline text-evgreen">Add one</button>' : ''}</div>`;
        return;
    }
    grid.innerHTML = agents.map(a => {
        const initial  = (a.name || '?')[0].toUpperCase();
        const stages   = ['Lead', 'Proposal', 'Negotiation', 'Won', 'Lost'];
        const maxCount = Math.max(...stages.map(s => a.stage_counts[s] || 0), 1);
        const barsHTML = stages.map(s => {
            const count = a.stage_counts[s] || 0;
            if (!count) return '';
            const pct   = Math.round((count / maxCount) * 100);
            const color = { Lead:'#3b82f6', Proposal:'#a855f7', Negotiation:'#f59e0b', Won:'#22c55e', Lost:'#ef4444' }[s];
            return `
            <div class="flex items-center gap-1.5 text-[10px]">
                <span class="text-gray-400 w-16 shrink-0">${s}</span>
                <div class="flex-1 bg-gray-100 rounded-full h-1">
                    <div class="h-1 rounded-full" style="width:${pct}%;background:${color}"></div>
                </div>
                <span class="font-semibold text-gray-600 w-4 text-right">${count}</span>
            </div>`;
        }).join('');

        const adminBtns = isAdmin ? `
            <div class="flex gap-1 ml-auto shrink-0" onclick="event.stopPropagation()">
                <button onclick="openAgentModal('${esc(a.id)}')"
                    class="w-7 h-7 flex items-center justify-center rounded-full border text-gray-300 hover:text-blue-600 hover:border-blue-300 transition">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </button>
                <button onclick="deleteAgent('${esc(a.id)}', '${esc(a.name)}')"
                    class="w-7 h-7 flex items-center justify-center rounded-full border text-gray-300 hover:text-red-500 hover:border-red-300 transition">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </button>
            </div>` : '';

        const contactLine = [a.email, a.phone].filter(Boolean).join(' · ');

        return `
        <div onclick="openPanel('${esc(a.id)}')"
             class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 hover:shadow-md hover:border-gray-200 transition cursor-pointer">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-11 h-11 rounded-full flex items-center justify-center font-bold text-base shrink-0"
                     style="${avatarStyle(a.name)}">${esc(initial)}</div>
                <div class="min-w-0 flex-1">
                    <p class="font-bold text-gray-900 text-sm truncate">${esc(a.name)}</p>
                    ${contactLine ? `<p class="text-xs text-gray-400 truncate">${esc(contactLine)}</p>` : ''}
                </div>
                ${adminBtns}
            </div>
            <div class="flex gap-4 mb-4">
                <div>
                    <p class="text-2xl font-black text-gray-900">${a.deal_count}</p>
                    <p class="text-xs text-gray-400">deals</p>
                </div>
                <div>
                    <p class="text-lg font-black text-gray-900">${fmtSGD(a.pipeline_value)}</p>
                    <p class="text-xs text-gray-400">pipeline</p>
                </div>
            </div>
            <div class="space-y-1">${barsHTML || '<p class="text-xs text-gray-300 italic">No deals assigned</p>'}</div>
        </div>`;
    }).join('');
}

async function openPanel(agentId) {
    const agent = allAgents.find(a => a.id === agentId);
    if (!agent) return;
    currentPanelAgentId = agentId;

    const initial = (agent.name || '?')[0].toUpperCase();
    const av = document.getElementById('panelAvatar');
    av.textContent = initial;
    av.style.cssText = avatarStyle(agent.name);

    document.getElementById('panelName').textContent      = agent.name;
    document.getElementById('panelContact').textContent   = [agent.email, agent.phone].filter(Boolean).join(' · ') || '';
    document.getElementById('panelDealCount').textContent = agent.deal_count;
    document.getElementById('panelPipeline').textContent  = fmtSGD(agent.pipeline_value);
    document.getElementById('panelDeals').innerHTML       = '<p class="text-xs text-gray-400">Loading…</p>';
    document.getElementById('panelCustomers').innerHTML   = '';

    document.getElementById('detailPanel').style.transform    = 'translateX(0)';
    document.getElementById('detailBackdrop').classList.remove('hidden');

    panelStageFilter = 'All';
    panelDealsData   = [];

    try {
        const res  = await fetch(`/api/agents/${agentId}/deals`, { headers: getAuthHeaders() });
        const data = await res.json();
        if (data.error) throw new Error(data.message);
        panelDealsData = data.deals || [];
        buildStageTabs(panelDealsData);
        renderPanelDeals(panelDealsData);
        renderPanelCustomers(data.customers || []);
    } catch (e) {
        document.getElementById('panelDeals').innerHTML =
            `<p class="text-xs text-red-500">Failed to load: ${esc(e.message)}</p>`;
    }
}

function closePanel() {
    document.getElementById('detailPanel').style.transform = 'translateX(100%)';
    document.getElementById('detailBackdrop').classList.add('hidden');
    currentPanelAgentId = null;
}

function buildStageTabs(dealList) {
    const counts = {};
    dealList.forEach(d => { counts[d.stage] = (counts[d.stage] || 0) + 1; });
    document.getElementById('panelStageTabs').innerHTML =
        ['All', 'Lead', 'Proposal', 'Negotiation', 'Won', 'Lost'].map(s => {
            const count = s === 'All' ? dealList.length : (counts[s] || 0);
            if (s !== 'All' && !count) return '';
            return `<button onclick="setPanelStage('${s}')" id="ptab_${s}"
                class="px-3 py-1 rounded-full text-xs font-bold border transition">
                ${s}${count ? ` <span class="opacity-60">${count}</span>` : ''}
            </button>`;
        }).join('');
    updateStageTabs();
}

function updateStageTabs() {
    ['All','Lead','Proposal','Negotiation','Won','Lost'].forEach(s => {
        const btn = document.getElementById('ptab_' + s);
        if (!btn) return;
        btn.style.cssText = s === panelStageFilter
            ? 'background:#1a3a2a;color:#fff;border-color:#1a3a2a'
            : 'background:#fff;color:#4b5563;border-color:#e5e7eb';
    });
}

function setPanelStage(stage) {
    panelStageFilter = stage;
    updateStageTabs();
    renderPanelDeals(panelDealsData);
}

function renderPanelDeals(dealList) {
    const filtered = panelStageFilter === 'All' ? dealList : dealList.filter(d => d.stage === panelStageFilter);
    const el = document.getElementById('panelDeals');
    if (!filtered.length) {
        el.innerHTML = '<p class="text-sm text-gray-400 italic">No deals in this stage.</p>';
        return;
    }
    el.innerHTML = filtered.map(d => {
        const cls = STAGE_STYLE[d.stage] || 'bg-gray-100 text-gray-500';
        return `
        <a href="/deals" class="block p-3 border rounded-xl hover:bg-gray-50 transition">
            <div class="flex items-start justify-between gap-2">
                <p class="font-medium text-gray-800 text-sm leading-tight">${esc(d.title)}</p>
                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold shrink-0 ${cls}">${esc(d.stage)}</span>
            </div>
            <div class="flex items-center gap-2 mt-1.5 text-xs text-gray-400 flex-wrap">
                ${d.customer_name ? `<span class="text-gray-600 font-medium">${esc(d.customer_name)}</span>` : ''}
                ${d.customer_name && d.value ? '<span>·</span>' : ''}
                ${d.value ? `<span class="font-semibold text-gray-700">SGD ${Number(d.value || 0).toLocaleString()}</span>` : ''}
                ${d.expected_close ? `<span>· closes ${esc(d.expected_close)}</span>` : ''}
            </div>
        </a>`;
    }).join('');
}

function renderPanelCustomers(customers) {
    document.getElementById('panelCustomerCount').textContent =
        customers.length ? `(${customers.length})` : '';
    document.getElementById('panelCustomers').innerHTML = customers.length
        ? customers.map(c => `
            <a href="/customers"
               class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-full text-xs font-medium text-gray-700 transition">
                ${esc(c.name)}
            </a>`).join('')
        : '<p class="text-sm text-gray-400 italic">No customers linked.</p>';
}

// ── Agent Modal ───────────────────────────────────────────────────────────────

function openAgentModal(agentId) {
    editingAgentId = agentId || null;
    const a = agentId ? allAgents.find(x => x.id === agentId) : null;

    document.getElementById('agentModalTitle').textContent      = a ? 'Edit Agent' : 'Add Agent';
    document.getElementById('agentModalSubmitBtn').textContent  = a ? 'Save Changes' : 'Create';
    document.getElementById('af_name').value  = a ? (a.name  || '') : '';
    document.getElementById('af_email').value = a ? (a.email || '') : '';
    document.getElementById('af_phone').value = a ? (a.phone || '') : '';
    document.getElementById('af_notes').value = a ? (a.notes || '') : '';
    document.getElementById('agentModalError').classList.add('hidden');
    document.getElementById('agentModal').classList.remove('hidden');
}

function closeAgentModal() {
    document.getElementById('agentModal').classList.add('hidden');
}

async function submitAgent() {
    const name = document.getElementById('af_name').value.trim();
    if (!name) { showAgentModalError('Name is required.'); return; }

    const payload = {
        name,
        email: document.getElementById('af_email').value.trim() || null,
        phone: document.getElementById('af_phone').value.trim() || null,
        notes: document.getElementById('af_notes').value.trim() || null,
    };

    const url    = editingAgentId ? `/api/agents/${editingAgentId}` : '/api/agents';
    const method = editingAgentId ? 'PUT' : 'POST';

    try {
        const res  = await fetch(url, { method, headers: getAuthHeaders(), body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.error) throw new Error(data.message || JSON.stringify(data));
        _cache.del('agents');
        closeAgentModal();
        await loadAgents();
        showToast(`Agent ${editingAgentId ? 'updated' : 'created'}.`, 'success');
    } catch (e) {
        showAgentModalError(e.message);
    }
}

function showAgentModalError(msg) {
    const el = document.getElementById('agentModalError');
    el.textContent = msg;
    el.classList.remove('hidden');
}

async function deleteAgent(agentId, name) {
    if (!confirm(`Delete agent "${name}"?\n\nTheir assigned deals will remain but become unassigned.`)) return;
    try {
        const res = await fetch(`/api/agents/${agentId}`, { method: 'DELETE', headers: getAuthHeaders() });
        const data = await res.json();
        if (data.error) throw new Error(data.message);
        _cache.del('agents');
        if (currentPanelAgentId === agentId) closePanel();
        await loadAgents();
        showToast('Agent deleted.', 'success');
    } catch (e) {
        showToast('Delete failed: ' + e.message, 'error');
    }
}

function editPanelAgent() {
    if (currentPanelAgentId) openAgentModal(currentPanelAgentId);
}
</script>
{% endblock %}
